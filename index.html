<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartID Connect - Full OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 15px; background-color: #f0f2f5; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
        .video-container { position: relative; width: 100%; height: 280px; background: #000; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .card-outline { position: absolute; top: 10%; left: 5%; width: 90%; height: 80%; border: 3px dashed #00b900; border-radius: 12px; pointer-events: none; box-sizing: border-box; }
        .status-badge { background-color: #ff9800; color: white; padding: 10px; border-radius: 5px; font-weight: bold; margin: 10px 0; font-size: 14px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-scan { background-color: #28a745; }
        .btn-submit { background-color: #007bff; }
        button:disabled { background-color: #ccc; color: #666; cursor: not-allowed; }
        .result-box { text-align: left; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SmartID Connect (Full OCR)</h2>
    <p style="margin:0 0 10px 0; color:#666; font-size:13px;">สแกนเลขบัตรและชื่อ-นามสกุล บันทึกวันเวลาลงชีตอัตโนมัติ</p>
    
    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="card-outline"></div>
    </div>
    
    <div id="status" class="status-badge">⏳ กำลังเตรียมระบบระบบสมองกลภาษาไทย...</div>
    <button id="scanBtn" class="btn-scan" disabled>📷 กดปุ่มนี้เพื่อสแกนบัตรประชาชน</button>
    
    <canvas id="captureCanvas" style="display:none;"></canvas>
    
    <div class="result-box">
        <label><b>เลขประจำตัวประชาชน 13 หลัก:</b></label>
        <input type="text" id="citizenId" placeholder="กรุณากดปุ่มสแกนบัตร...">
        
        <label><b>ชื่อ - นามสกุล (ไทย):</b></label>
        <input type="text" id="fullName" placeholder="กรุณากดปุ่มสแกนบัตร...">
        
        <button id="submitBtn" class="btn-submit" disabled>💾 บันทึกข้อมูลเข้า Google Sheet</button>
    </div>
</div>

<script>
    // ⚠️ นำลิงก์ Web App URL ตัวท้ายด้วย /exec ของอาจารย์มาวางใส่ตรงนี้ครับ
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxy7phmx-fo_asO48bWEZwF1tAfrOUABbb_gL5v3j8bajc_UN_WAIOemRZ6MJUq5EG2NA/exec"; 

    const video = document.getElementById('video');
    const canvas = document.getElementById('captureCanvas');
    const statusDiv = document.getElementById('status');
    const scanBtn = document.getElementById('scanBtn');
    const submitBtn = document.getElementById('submitBtn');
    let worker = null;

    // โหลดภาษาไทย + อังกฤษ พร้อมกันเพื่อดึงข้อมูลชื่อและเลข
    async function initOCR() {
        try {
            worker = await Tesseract.createWorker(['tha', 'eng']);
            statusDiv.innerText = "🔍 ระบบพร้อมใช้งาน! เล็งบัตรให้อยู่ในกรอบแล้วกดปุ่มสแกน";
            statusDiv.style.backgroundColor = "#28a745";
            scanBtn.disabled = false;
            startCamera();
        } catch (e) {
            statusDiv.innerText = "โหลด AI ล้มเหลว: " + e;
        }
    }

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" }, width: 1920, height: 1080 },
            audio: false
        });
        video.srcObject = stream;
    }

    // ฟังก์ชันถ่ายภาพนิ่งความละเอียดสูงและถอดข้อความภาษาไทยและเลขบัตร
    scanBtn.addEventListener('click', async () => {
        scanBtn.innerText = "⏳ กำลังแกะข้อมูลภาษาไทยและตัวเลข...";
        scanBtn.disabled = true;
        statusDiv.innerText = "🧠 AI กำลังทำงาน โปรดถือบัตรนิ่งๆ...";
        statusDiv.style.backgroundColor = "#ff9800";

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
            const { data: { text } } = await worker.recognize(canvas);
            
            // 1. ค้นหาเลขบัตร 13 หลัก
            const idMatch = text.match(/[0-9]{1}-[0-9]{4}-[0-9]{5}-[0-9]{2}-[0-9]{1}/) || text.match(/[0-9]{13}/);
            
            // 2. ค้นหาชื่อภาษาไทย (ตัดคำว่า ชื่อ หรือ นาย/นาง/นางสาว)
            let nameFound = "ไม่พบชื่อภาษาไทย (โปรดพิมพ์ระบุ)";
            const nameMatch = text.match(/(ชื่อ|Name)\s*[:\s]*([ก-์]+\s+[ก-์]+)/) || text.match(/(นาย|นาง|นางสาว)\s*([ก-์]+\s+[ก-์]+)/);
            if (nameMatch) {
                nameFound = nameMatch[0].replace(/ชื่อ|Name|:|/g, "").trim();
            }

            if (idMatch) {
                document.getElementById('citizenId').value = idMatch[0].replace(/-/g, "");
                document.getElementById('fullName').value = nameFound;
                statusDiv.innerText = "🎉 ถอดรหัสสำเร็จ! ตรวจสอบข้อมูลแล้วกดบันทึก";
                statusDiv.style.backgroundColor = "#007bff";
                submitBtn.disabled = false;
            } else {
                alert("สแกนตัวเลขไม่สำเร็จ กรุณาจัดมุมกล้อง ขยับเข้าไปใกล้ๆ บัตรให้ชัดเจนขึ้น แล้วกดปุ่มสแกนใหม่อีกครั้งครับอาจารย์");
                statusDiv.innerText = "🔍 ลองสแกนใหม่อีกครั้ง";
                statusDiv.style.backgroundColor = "#28a745";
            }
        } catch (err) {
            alert("เกิดข้อผิดพลาด: " + err);
        }
        scanBtn.innerText = "📷 กดปุ่มนี้เพื่อสแกนบัตรประชาชน";
        scanBtn.disabled = false;
    });

    // ส่งข้อมูลเข้าชีต
    submitBtn.addEventListener('click', () => {
        submitBtn.innerText = "⏳ กำลังส่งข้อมูล...";
        submitBtn.disabled = true;
        
        const id = document.getElementById('citizenId').value;
        const name = document.getElementById('fullName').value;

        fetch(`${WEB_APP_URL}?citizenId=${encodeURIComponent(id)}&fullName=${encodeURIComponent(name)}`, {
            method: 'POST'
        })
        .then(res => {
            alert("💾 บันทึกข้อมูลสำเร็จ! ตรวจสอบวันที่และเวลาใน Google Sheet ได้เลยครับอาจารย์");
            document.getElementById('citizenId').value = "";
            document.getElementById('fullName').value = "";
            submitBtn.disabled = true;
        })
        .catch(err => {
            alert("เกิดข้อผิดพลาด: " + err);
            submitBtn.disabled = false;
        });
    });

    window.addEventListener('load', initOCR);
</script>

</body>
</html>
