<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartID Connect - Dual-Zone OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 15px; background-color: #f0f2f5; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
        .video-container { position: relative; width: 100%; height: 280px; background: #000; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* กรอบเล็งบัตรประชาชน */
        .card-outline { position: absolute; top: 10%; left: 5%; width: 90%; height: 80%; border: 3px dashed #28a745; border-radius: 12px; pointer-events: none; box-sizing: border-box; }
        
        /* เส้นไฮไลท์ระบุตำแหน่งสำคัญบนบัตร */
        .zone-id { position: absolute; top: 22%; left: 10%; width: 50%; height: 15%; border: 1px solid #ff3b30; background: rgba(255,59,48,0.1); font-size: 10px; color: #ff3b30; border-radius: 4px; pointer-events: none; }
        .zone-name { position: absolute; top: 40%; left: 30%; width: 60%; height: 15%; border: 1px solid #007bff; background: rgba(0,123,255,0.1); font-size: 10px; color: #007bff; border-radius: 4px; pointer-events: none; }

        .status-badge { background-color: #ff9800; color: white; padding: 10px; border-radius: 5px; font-weight: bold; margin: 10px 0; font-size: 14px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-scan { background-color: #28a745; width: 100%; font-size: 18px; padding: 16px; }
        .btn-submit { background-color: #007bff; width: 100%; }
        button:disabled { background-color: #ccc; color: #666; cursor: not-allowed; }
        .result-box { text-align: left; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SmartID Connect (Dual-Zone)</h2>
    <p style="margin:0 0 10px 0; color:#666; font-size:13px;">วางตำแหน่งบัตรให้ตรงล็อกเพื่อสแกนเลขและชื่อไทยอย่างแม่นยำ</p>
    
    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="card-outline"></div>
        <div class="zone-id">เล็งเลข 13 หลักตรงนี้</div>
        <div class="zone-name">เล็งชื่อไทยตรงนี้</div>
    </div>
    
    <div id="status" class="status-badge">⏳ กำลังเตรียมระบบระบบสมองกลภาษาไทย...</div>
    <button id="scanBtn" class="btn-scan" disabled>📷 กดปุ่มนี้เพื่อสแกนบัตรประชาชน</button>
    
    <canvas id="canvasId" style="display:none;"></canvas>
    <canvas id="canvasName" style="display:none;"></canvas>
    <canvas id="mainCanvas" style="display:none;"></canvas>
    
    <div class="result-box">
        <label><b>เลขประจำตัวประชาชน 13 หลัก:</b></label>
        <input type="text" id="citizenId" placeholder="กรุณากดปุ่มสแกนบัตร...">
        
        <label><b>ชื่อ - นามสกุล (ไทย):</b></label>
        <input type="text" id="fullName" placeholder="กรุณากดปุ่มสแกนบัตร...">
        
        <button id="submitBtn" class="btn-submit" disabled>💾 บันทึกข้อมูลเข้า Google Sheet</button>
    </div>
</div>

<script>
    // ลิงก์ระบบหลังบ้านส่งข้อมูลเข้า Google Sheet ของอาจารย์
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxy7phmx-fo_asO48bWEZwF1tAfrOUABbb_gL5v3j8bajc_UN_WAIOemRZ6MJUq5EG2NA/exec"; 

    const video = document.getElementById('video');
    const scanBtn = document.getElementById('scanBtn');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');
    
    let worker = null;

    async function initOCR() {
        try {
            worker = await Tesseract.createWorker(['tha', 'eng']);
            statusDiv.innerText = "🔍 ระบบพร้อมใช้งาน! วางบัตรให้ตรงล็อกแล้วกดสแกน";
            statusDiv.style.backgroundColor = "#28a745";
            scanBtn.disabled = false;
            startCamera();
        } catch (e) {
            statusDiv.innerText = "โหลด AI ล้มเหลว: " + e;
        }
    }

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" }, width: 1920, height: 1080 },
            audio: false
        });
        video.srcObject = stream;
    }

    scanBtn.addEventListener('click', async () => {
        scanBtn.innerText = "⏳ กำลังประมวลผลแยกโซนข้อมูล...";
        scanBtn.disabled = true;
        statusDiv.innerText = "🧠 AI กำลังถอดรหัสภาพ โปรดถือมือนิ่งๆ...";
        statusDiv.style.backgroundColor = "#ff9800";

        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d');
        const w = video.videoWidth || 1280;
        const h = video.videoHeight || 720;
        mainCanvas.width = w;
        mainCanvas.height = h;
        ctx.drawImage(video, 0, 0, w, h);

        // 1. ครอปเฉพาะโซนเลข 13 หลัก (บนซ้ายของบัตร)
        const canvasId = document.getElementById('canvasId');
        canvasId.width = w * 0.5; canvasId.height = h * 0.15;
        canvasId.getContext('2d').drawImage(mainCanvas, w * 0.1, h * 0.22, w * 0.5, h * 0.15, 0, 0, w * 0.5, h * 0.15);

        // 2. ครอปเฉพาะโซนชื่อภาษาไทย (กลางขวาของบัตร)
        const canvasName = document.getElementById('canvasName');
        canvasName.width = w * 0.6; canvasName.height = h * 0.15;
        canvasName.getContext('2d').drawImage(mainCanvas, w * 0.3, h * 0.4, w * 0.6, h * 0.15, 0, 0, w * 0.6, h * 0.15);

        try {
            // ส่งตรวจจับโซนตัวเลข (ใช้เวลาเสี้ยววินาทีเนื่องจากภาพมีขนาดเล็กมาก)
            const resultId = await worker.recognize(canvasId);
            const cleanedId = resultId.data.text.replace(/[^0-9]/g, "");
            
            // ส่งตรวจจับโซนชื่อภาษาไทย
            const resultName = await worker.recognize(canvasName);
            let cleanedName = resultName.data.text.replace(/[A-Za-z0-9]/g, "").trim();
            cleanedName = cleanedName.replace(/(ชื่อ|Name|นาย|นางสาว|นาง|:|ภ|ม|ย)/g, "").trim();

            if (cleanedId.length >= 13) {
                document.getElementById('citizenId').value = cleanedId.substring(0, 13);
                document.getElementById('fullName').value = cleanedName || "ตรวจสอบและพิมพ์ชื่อเพิ่มเติม";
                statusDiv.innerText = "🎉 สแกนสำเร็จเสร็จสิ้น!";
                statusDiv.style.backgroundColor = "#007bff";
                submitBtn.disabled = false;
            } else {
                alert("AI อ่านเลขบัตรไม่ชัดเจน กรุณาขยับกล้องเข้าไปใกล้บัตรประชาชนให้อยู่ในกรอบ และมีแสงสว่างเพียงพอ จากนั้นกดสแกนใหม่อีกครั้งครับอาจารย์");
                statusDiv.innerText = "🔍 ระบบพร้อมสแกนใหม่อีกครั้ง";
                statusDiv.style.backgroundColor = "#28a745";
            }
        } catch (err) {
            alert("เกิดข้อผิดพลาด: " + err);
        }
        
        scanBtn.innerText = "📷 กดปุ่มนี้เพื่อสแกนบัตรประชาชน";
        scanBtn.disabled = false;
    });

    submitBtn.addEventListener('click', () => {
        submitBtn.innerText = "⏳ กำลังบันทึกลง Sheet...";
        submitBtn.disabled = true;
        
        const id = document.getElementById('citizenId').value;
        const name = document.getElementById('fullName').value;

        fetch(`${WEB_APP_URL}?citizenId=${encodeURIComponent(id)}&fullName=${encodeURIComponent(name)}`, {
            method: 'POST'
        })
        .then(res => {
            alert("💾 บันทึกข้อมูล วันที่ และเวลา เข้า Google Sheet เรียบร้อยครับอาจารย์!");
            document.getElementById('citizenId').value = "";
            document.getElementById('fullName').value = "";
            submitBtn.disabled = true;
        })
        .catch(err => {
            alert("เกิดข้อผิดพลาด: " + err);
            submitBtn.disabled = false;
        });
    });

    window.addEventListener('load', initOCR);
</script>

</body>
</html>
