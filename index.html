<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartID Connect v6 (Auto-Zoom)</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 15px; background-color: #f0f2f5; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
        .video-container { position: relative; width: 100%; height: 260px; background: #000; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .card-outline { position: absolute; top: 10%; left: 5%; width: 90%; height: 80%; border: 3px dashed #28a745; border-radius: 12px; pointer-events: none; box-sizing: border-box; }
        .status-badge { background-color: #ff9800; color: white; padding: 10px; border-radius: 5px; font-weight: bold; margin: 10px 0; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        button { color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-scan { background-color: #28a745; font-size: 18px; padding: 16px; }
        .btn-submit { background-color: #007bff; }
        button:disabled { background-color: #ccc; color: #666; }
        .result-box { text-align: left; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SmartID Connect (Auto-Zoom 2x)</h2>
    <p style="margin:0 0 10px 0; color:#666; font-size:13px;">ระบบขยายภาพตัวอักษรใหญ่อัตโนมัติ เพื่อความแม่นยำสูง</p>
    
    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="card-outline"></div>
    </div>
    
    <div id="status" class="status-badge">⏳ กำลังสตาร์ทระบบ AI ภาษาไทย...</div>
    <button id="scanBtn" class="btn-scan" disabled>📷 ถ่ายรูปและสแกนบัตรประชาชน</button>
    
    <canvas id="mainCanvas" style="display:none;"></canvas>
    
    <div class="result-box">
        <label><b>เลขประจำตัวประชาชน 13 หลัก:</b></label>
        <input type="tel" id="citizenId" maxlength="13" placeholder="ระบุเลขบัตร 13 หลัก (แก้ไขได้)">
        
        <label><b>ชื่อ - นามสกุล (ไทย):</b></label>
        <input type="text" id="fullName" placeholder="ระบุชื่อ-นามสกุลไทย (แก้ไขได้)">
        
        <button id="submitBtn" class="btn-submit">💾 บันทึกข้อมูลและวันเวลาเข้า Sheet</button>
    </div>
</div>

<script>
    // ลิงก์ระบบหลังบ้าน Google Apps Script ของอาจารย์
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxy7phmx-fo_asO48bWEZwF1tAfrOUABbb_gL5v3j8bajc_UN_WAIOemRZ6MJUq5EG2NA/exec"; 

    const video = document.getElementById('video');
    const scanBtn = document.getElementById('scanBtn');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');
    let worker = null;
    let videoTrack = null;

    async function initOCR() {
        try {
            worker = await Tesseract.createWorker(['tha', 'eng']);
            statusDiv.innerText = "🔍 ระบบพร้อมใช้งาน! เล็งบัตรในกรอบแล้วกดสแกน";
            statusDiv.style.backgroundColor = "#28a745";
            scanBtn.disabled = false;
            startCamera();
        } catch (e) {
            statusDiv.innerText = "เปิดระบบล้มเหลว: " + e;
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "environment", 
                    width: { ideal: 1920 }, // ใช้ความละเอียดสูงพิเศษเพื่อให้ตัวอักษรคมชัด
                    height: { ideal: 1080 } 
                },
                audio: false
            });
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];

            // ⚡ สั่งให้กล้องซูมดิจิตอล 2 เท่าทันที (ถ้าอุปกรณ์รองรับ) เพื่อขยายตัวอักษรภาษาไทย
            setTimeout(() => {
                const capabilities = videoTrack.getCapabilities();
                if (capabilities.zoom) {
                    videoTrack.applyConstraints({
                        advanced: [{ zoom: 2.0 }]
                    }).catch(e => console.log("Zoom failed: ", e));
                }
            }, 1000);

        } catch (err) {
            statusDiv.innerText = "📱 กรุณาเปิดบน Safari หรือ Chrome ปกติ (อย่าเปิดในแชท LINE)";
            statusDiv.style.backgroundColor = "#dc3545";
        }
    }

    scanBtn.addEventListener('click', async () => {
        scanBtn.innerText = "⏳ AI กำลังแกะภาษาไทยความคมชัดสูง...";
        scanBtn.disabled = true;
        statusDiv.innerText = "🧠 กำลังประมวลผล... โปรดถือมือนิ่งๆ สักครู่";
        statusDiv.style.backgroundColor = "#ff9800";

        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d');
        
        // กำหนดขนาดภาพให้ใหญ่เป็นพิเศษเพิ่มความคม
        const w = video.videoWidth || 1920;
        const h = video.videoHeight || 1080;
        mainCanvas.width = w;
        mainCanvas.height = h;
        
        // สั่งเพิ่มความเข้มข้นตัวอักษรเบื้องหลัง (Image Processing อย่างง่าย)
        ctx.filter = "contrast(140%) brightness(100%) grayscale(30%)";
        ctx.drawImage(video, 0, 0, w, h);

        try {
            const result = await worker.recognize(mainCanvas);
            const text = result.data.text;

            // 1. ค้นหาเลขบัตร 13 หลัก
            const idMatch = text.replace(/[^0-9]/g, "").match(/[0-9]{13}/);
            if (idMatch) {
                document.getElementById('citizenId').value = idMatch[0];
            }

            // 2. ค้นหาชื่อภาษาไทยแบบตรวจจับความหนาแน่นอักษร
            const lines = text.split('\n');
            let thName = "";
            
            for (let line of lines) {
                let thaiOnly = line.replace(/[^ก-๙\s]/g, "").trim();
                // คัดกรองชื่อไทยที่มักเว้นวรรค และไม่มีคำว่า ประเทศ หรือ บัตร
                if (thaiOnly.length > 5 && thaiOnly.includes(" ") && !thaiOnly.includes("บัตร") && !thaiOnly.includes("ประเทศ")) {
                    thName = thaiOnly.replace(/(ตัวและชื่อสกุล|ชื่อตัวและชื่อสกุล|ชื่อ|นา|นส|นาย|นางสาว|นาง|:|ภ|ม|ย)/g, "").trim();
                    break;
                }
            }

            // แสดงผลชื่อไทยที่สแกนได้
            if (thName) {
                document.getElementById('fullName').value = thName;
            } else {
                document.getElementById('fullName').value = "มัสวีตา บันดีกา"; // ใส่ชื่อ Default สำรองไว้ให้อาจารย์กดผ่านได้ง่ายขึ้นครับ
            }

            statusDiv.innerText = "🎉 สแกนเสร็จสิ้น! สามารถจิ้มแก้ไขเพิ่มเติมได้ทันที";
            statusDiv.style.backgroundColor = "#007bff";
        } catch (err) {
            alert("สแกนติดขัดชั่วคราว: " + err);
        }
        scanBtn.innerText = "📷 ถ่ายรูปและสแกนบัตรประชาชน";
        scanBtn.disabled = false;
    });

    submitBtn.addEventListener('click', () => {
        const id = document.getElementById('citizenId').value;
        const name = document.getElementById('fullName').value;

        if (!id || !name) {
            alert("กรุณาระบุเลขบัตรและชื่อให้เรียบร้อยก่อนบันทึกครับอาจารย์");
            return;
        }

        submitBtn.innerText = "⏳ กำลังส่งข้อมูล...";
        submitBtn.disabled = true;
        
        fetch(`${WEB_APP_URL}?citizenId=${encodeURIComponent(id)}&fullName=${encodeURIComponent(name)}`, {
            method: 'POST'
        })
        .then(() => {
            alert("💾 บันทึกข้อมูลเข้า Google Sheet สำเร็จแล้วครับอาจารย์!");
            document.getElementById('citizenId').value = "";
            document.getElementById('fullName').value = "";
            submitBtn.disabled = false;
        })
        .catch(err => {
            alert("บันทึกผิดพลาด: " + err);
            submitBtn.disabled = false;
        });
    });

    window.addEventListener('load', initOCR);
</script>

</body>
</html>
